services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: parcelflow:latest
    container_name: parcelflow
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel run
    depends_on:
      - web
    network_mode: host

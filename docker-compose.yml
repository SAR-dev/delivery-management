services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: parcelflow:latest
    container_name: parcelflow
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  cloudflared:
